<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glow {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(100, 80, 255, 0.3), rgba(255, 80, 180, 0.15), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        header {
            z-index: 1;
            padding: 32px;
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        header p {
            color: #888;
            font-size: 0.9rem;
            margin-top: 6px;
        }

        #chat-box {
            z-index: 1;
            flex: 1;
            width: 100%;
            max-width: 720px;
            overflow-y: auto;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .bubble.user {
            background: #5b4ef8;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bubble.turo {
            background: #1e1e1e;
            align-self: flex-start;
            border: 1px solid #2a2a2a;
            border-bottom-left-radius: 4px;
        }

        .bubble.typing {
            color: #888;
            font-style: italic;
        }

        .input-area {
            z-index: 1;
            width: 100%;
            max-width: 720px;
            padding: 16px 24px 28px;
        }

        .input-box {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 14px 18px;
            gap: 12px;
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 0.95rem;
            resize: none;
            max-height: 120px;
        }

        #user-input::placeholder { color: #555; }

        #send-btn {
            background: #5b4ef8;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #send-btn:hover { background: #7b6ef8; }

        #send-btn svg {
            width: 16px;
            height: 16px;
            fill: white;
        }
    </style>
</head>
<body>
    <div class="glow"></div>

    <header>
        <h1>Turo</h1>
        <p>Your personal teaching assistant by Emyl.AI</p>
    </header>

    <div id="chat-box"></div>

    <div class="input-area">
        <div class="input-box">
            <textarea id="user-input" rows="1" placeholder="Ask Turo anything..."></textarea>
            <button id="send-btn">
                <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function addBubble(text, sender) {
            const bubble = document.createElement('div');
            bubble.classList.add('bubble', sender);
            bubble.textContent = text;
            chatBox.appendChild(bubble);
            chatBox.scrollTop = chatBox.scrollHeight;
            return bubble;
        }

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            addBubble(message, 'user');
            input.value = '';

     const typing = addBubble('Turo is thinking...', 'turo');
     
            try {
                const response = await fetch('/ai-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                typing.remove();
                addBubble(data.reply, 'turo');
            } catch {
                typing.remove();
                addBubble('Something went wrong. Try again.', 'turo');
            }
        }

        sendBtn.addEventListener('click', sendMessage);

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
